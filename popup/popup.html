<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <h1 class="popup-title">OCR 單字擷取</h1>
    <p class="popup-hint">快捷鍵：Alt+Shift+O</p>
    <div class="popup-buttons">
      <button id="btn-wordlist" class="popup-btn">
        <span class="btn-icon">📚</span>
        <span>單字列表</span>
      </button>
      <button id="btn-settings" class="popup-btn">
        <span class="btn-icon">⚙️</span>
        <span>設定</span>
      </button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
